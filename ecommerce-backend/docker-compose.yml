# docker-compose.yml — đổi thành đọc từ .env
services:
  db:
    image: mysql:8
    container_name: ecommerce_db
    restart: always
    env_file: .env
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    container_name: ecommerce_backend
    restart: always
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/ecommerce_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: root
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db

volumes:
  db_data: